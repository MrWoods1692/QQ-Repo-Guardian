# 管理员 QQ 号：只有这些 QQ 可以使用 /repo-guardian ping 和 /repo-guardian repos。
admins = [123456789]

# NapCat 自动配置。默认 cargo run 会调用 ./napcat/start.sh 下载并启动 NapCat；首次运行只需要在终端扫码。
# 扫码成功后会自动尝试快速登录；如自动识别不到账号，可运行：QRG_NAPCAT_QQ=你的QQ号 cargo run。
[bot]
type = "napcat"
endpoint = "http://127.0.0.1:3000"
command = "./napcat/start.sh"
timeout_secs = 180
# token = ""
# 填写 QQ 号以启用快速登录，避免每次扫码；留空则自动尝试从历史登录数据中识别。
napcat_qq = ""

# 仓库网页轮询：每 interval_secs 秒检查一次 commits.atom；访问 GitHub 超过 timeout_secs 秒就放弃本轮，等待下一轮。
# interval_secs 最小按 30 秒执行；GitHub 网络不稳定时建议 60 秒轮询、10-15 秒超时。
# 如果本机使用 Hiddify 等 HTTP 代理，可以填写 proxy，例如 http://127.0.0.1:12334；不使用代理可删除这一行。
[poller]
enabled = true
interval_secs = 60
timeout_secs = 10
proxy = "http://127.0.0.1:12334"

# 群定时任务：默认给所有仓库配置中的 QQ 群发送。程序如果在 09:00 后启动且当天还没签到，会自动补签。
# 早安、午安、晚安只在对应时间附近发送；凌晨休息提醒会从内置文案池随机生成。
[schedule]
enabled = true
group_sign = true
sign_time = "09:00"
morning_time = "08:30"
noon_time = "12:00"
noon_news = true
# 所有云智 API（快讯、天气、翻译）共用此 token
api_token = ""
evening_time = "22:00"
late_start_hour = 0
late_end_hour = 5
late_remind_cooldown_secs = 7200
# 每天早上 8 点推送天气；token 使用上面的 api_token。
morning_weather = true
weather_location = "北京"
weather_time = "08:00"
# weather_groups 留空则推送到所有仓库群；指定群号则只推这些群。
weather_groups = []
# 自动翻译群里的非中文消息（引用原消息回复，不艾特）
auto_translate = true
# 群内 /chat 命令和私聊聊天（使用 DeepSeek-R1，共用上方 api_token）
chat_enabled = true

# 群消息违禁词撤回：enabled 开启后，消息包含 forbidden_words 任意词会自动撤回。
# forbidden_words 留空时不会撤回；Bot 需要是群管理员，NapCat 需要能收到 message_id。
# warn = true 会在撤回后 @ 发言人提醒，想静默撤回可改成 false。
[moderation]
enabled = true
forbidden_words = []
recall = true
warn = true

[[repositories]]
# GitHub 名称：填写用户名或组织名，例如 https://github.com/owner/repo 里的 owner。
github = "owner"
# 仓库名称：填写仓库名，例如 https://github.com/owner/repo 里的 repo。
repo = "repo"
# 接收推送消息的 QQ 群号。没有群聊就保留空数组 []。
groups = [10000]
# 接收推送消息的 QQ 私聊。没有私聊就保留空数组 []。
privates = [123456789]

# 继续添加仓库时，复制下面这一组并修改对应内容：
# [[repositories]]
# github = "another-owner"
# repo = "another-repo"
# groups = [10001]
# privates = []